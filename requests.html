<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Request a Song — ANJALI</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, get }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // ============================================================
    // ★ FIREBASE CONFIG — paste your values here
    // ============================================================
    const firebaseConfig = {
      apiKey:            "AIzaSyCHVFwE634VObOGsqS5kmUXhh_J5sIzNu0",
      authDomain:        "anjali-requests.firebaseapp.com",
      databaseURL:       "https://anjali-requests-default-rtdb.firebaseio.com",
      projectId:         "anjali-requests",
      storageBucket:     "anjali-requests.firebasestorage.app",
      messagingSenderId: "352245091478",
      appId:             "1:352245091478:web:5d118cb2468b97593b06b7",
    };
    // ============================================================
    // ★ SITE CONFIG
    // ============================================================
    window.VENMO_USERNAME     = "AnjaliBothra";
    window.DASHBOARD_PASSWORD = "anjali2024";   // ← change this!
    window.ARTIST_NAME        = "ANJALI";
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // Expose DB helpers to the app
    window.fbSubmit = async (song, name, tip) => {
      await push(ref(db, "requests"), {
        song, name: name || "Anonymous", tip: tip || 0,
        ts: Date.now(), played: false,
      });
    };

    window.fbListen = (callback) => {
      return onValue(ref(db, "requests"), snap => {
        const data = snap.val() || {};
        const list = Object.entries(data).map(([key, v]) => ({...v, key}));
        callback(list);
      });
    };

    window.fbMarkPlayed = async (key) => {
      await update(ref(db, `requests/${key}`), { played: true });
    };

    window.fbClearAll = async () => {
      await remove(ref(db, "requests"));
    };

    window.fbReady = true;
    document.dispatchEvent(new Event("fb-ready"));
  </script>

  <style>

    .queue-num.top { background: #E0528D; color: #fff; }
    .up-next { position: absolute; top: -8px; right: 10px; background: #E0528D; color: #fff;
               font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase;
               padding: 2px 8px; border-radius: 10px; }
    .boosted { color: #E0528D; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .song-title { color: #F4F1EB; font-style: italic; font-size: 17px; }
    .song-from  { color: rgba(244,241,235,0.45); font-size: 11px; margin-top: 2px; }
    .tip-amt    { color: #E0528D; margin-left: 8px; font-weight: 600; }
    .pill { background: #1a0f14; border: 0.5px solid #E0528D; border-radius: 9px;

    .spinner { width: 20px; height: 20px; border: 2px solid rgba(224,82,141,0.2);
               border-top-color: #E0528D; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 40px auto; }
    .error-box { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.3);
                 border-radius: 6px; padding: 14px 16px; color: #ff8080; font-size: 13px;

    .notif-btn { background: rgba(224,82,141,0.1); border: 1px solid #E0528D; color: #E0528D;

                 text-transform: uppercase; font-family: 'Montserrat', sans-serif;
                 width: 100%; margin-bottom: 14px; }
  </style>

<body>
<div class="dots" id="dots"></div>
<div id="root"><div class="page"><div class="spinner"></div></div></div>

<script>
// ── Decorative dots ──────────────────────────────────────────
(function() {
  const d = document.getElementById("dots");
  const cfg = [
    {top:"7%",left:"5%",s:4,dur:5,del:0},{top:"20%",left:"90%",s:3,dur:4,del:0.8},
    {top:"50%",left:"3%",s:3,dur:6,del:1.5},{top:"72%",left:"93%",s:4,dur:5,del:0.3},
    {top:"38%",left:"48%",s:2,dur:7,del:2},{top:"86%",left:"18%",s:3,dur:4,del:1},
  ];
  cfg.forEach(o => {
    const el = document.createElement("div");
    el.className = "dot";
    Object.assign(el.style, {
      top:o.top, left:o.left, width:o.s+"px", height:o.s+"px",
      animation:`float ${o.dur}s ease-in-out ${o.del}s infinite alternate`,
    });
    d.appendChild(el);
  });
})();

// ── State ────────────────────────────────────────────────────
let view    = "fan";   // fan | queue | login | dashboard
let authed  = false;
let unsubscribe = null;

// ── Wait for Firebase ────────────────────────────────────────
function whenReady(fn) {
  if (window.fbReady) fn();
  else document.addEventListener("fb-ready", fn, { once: true });
}

// ── Router ───────────────────────────────────────────────────
function navigate(v) {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  view = v;
  history.replaceState(null, "", "#" + v);
  render();
}

window.addEventListener("hashchange", () => {
  const h = location.hash.replace("#","");
  if (h === "dashboard") { view = authed ? "dashboard" : "login"; }
  else if (h === "queue") { view = "queue"; }
  else { view = "fan"; }
  render();
});

// ── Render ───────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if      (view === "login")                root.innerHTML = loginHTML();
  else if (view === "dashboard" && authed)  { root.innerHTML = dashHTML(); initDash(); }
  else if (view === "queue")                { root.innerHTML = queueHTML(); initQueue(); }
  else                                      root.innerHTML = fanHTML();
}

// ══════════════════════════════════════════════════════════════
// FAN PAGE
// ══════════════════════════════════════════════════════════════
function fanHTML() {
  return `
  <div class="page">
    <div class="card">
      <div class="logo">${window.ARTIST_NAME}</div>
      <h1 class="h2" style="font-size:30px;margin-bottom:4px">request a song</h1>
      <p class="sub">live tonight — make it yours ✨</p>

      <div class="field">
        <label class="label">song request *</label>
        <input class="input" id="f-song" placeholder="song name (+ artist if not mine)" autofocus>
      </div>
      <div class="field">
        <label class="label">your name <span style="opacity:0.5;font-weight:400">(optional)</span></label>
        <input class="input" id="f-name" placeholder="leave blank to stay anonymous">
      </div>
      <div class="field">
        <label class="label">
          boost your request with a tip
          <span style="opacity:0.5;font-weight:400;margin-left:6px;font-size:9px">higher tip = higher in queue</span>
        </label>
        <div class="tip-row" id="tip-row">
          <button class="tip-btn on" data-tip="0" onclick="selectTip(0)">no tip</button>
          <button class="tip-btn" data-tip="1"  onclick="selectTip(1)">$1</button>
          <button class="tip-btn" data-tip="5"  onclick="selectTip(5)">$5</button>
          <button class="tip-btn" data-tip="10" onclick="selectTip(10)">$10</button>
          <button class="tip-btn" data-tip="20" onclick="selectTip(20)">$20</button>
          <button class="tip-btn" data-tip="50" onclick="selectTip(50)">💖</button>
          <button class="tip-btn" data-tip="custom" onclick="selectTip('custom')">other</button>
        </div>
        <div id="custom-wrap" style="display:none;margin-top:8px">
          <input class="input" id="f-custom" type="number" min="1" placeholder="enter amount e.g. 15">
        </div>
      </div>

      <button class="btn-primary" id="submit-btn" onclick="submitRequest()">submit request →</button>
      <div id="fan-error"></div>
      <button class="btn-ghost" onclick="navigate('queue')">see the live queue</button>
    </div>
  </div>`;
}

let selectedTip = 0;
function selectTip(val) {
  selectedTip = val;
  document.querySelectorAll(".tip-btn").forEach(b => {
    b.classList.toggle("on", b.dataset.tip == val);
  });
  document.getElementById("custom-wrap").style.display = val === "custom" ? "block" : "none";
  updateSubmitBtn();
}

function updateSubmitBtn() {
  const song = (document.getElementById("f-song")||{}).value || "";
  const btn  = document.getElementById("submit-btn");
  if (!btn) return;
  const tip = selectedTip === "custom"
    ? (parseFloat(document.getElementById("f-custom")?.value)||0)
    : (selectedTip||0);
  btn.textContent = tip > 0 ? `submit + tip $${tip} →` : "submit request →";
  btn.disabled = !song.trim();
}

// Attach live input listener after render
const _origFanHTML = fanHTML;
document.addEventListener("input", e => {
  if (e.target.id === "f-song" || e.target.id === "f-custom") updateSubmitBtn();
});
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && e.target.id === "f-song") submitRequest();
});

async function submitRequest() {
  const song = document.getElementById("f-song")?.value?.trim();
  const name = document.getElementById("f-name")?.value?.trim();
  if (!song) return;
  const tip = selectedTip === "custom"
    ? (parseFloat(document.getElementById("f-custom")?.value)||0)
    : (selectedTip||0);

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "submitting…";

  try {
    await window.fbSubmit(song, name, tip);
    // Show result
    showFanResult(song, name, tip);
  } catch(err) {
    document.getElementById("fan-error").innerHTML =
      `<div class="error-box" style="margin-top:12px">could not submit — check your connection and try again.<br><small>${err.message}</small></div>`;
    btn.disabled = false;
    btn.textContent = "try again →";
  }
}

function showFanResult(song, name, tip) {
  const root = document.getElementById("root");
  if (tip > 0) {
    root.innerHTML = `
    <div class="page">
      <div class="card" style="text-align:center">
        <div class="logo">${window.ARTIST_NAME}</div>
        <div style="font-size:48px;margin-bottom:12px">💸</div>
        <h2 class="h2">send your tip</h2>
        <p class="sub" style="margin-bottom:24px">tip <strong style="color:#E0528D">$${tip}</strong> to lock in your boost for<br><em>"${song}"</em></p>
        <a href="https://venmo.com/${window.VENMO_USERNAME}?txn=pay&amount=${tip}&note=${encodeURIComponent("Song request: "+song)}"
           target="_blank" class="pay-btn" style="background:#3D95CE;color:#fff">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.03 1.89c.47.84.68 1.71.68 2.82 0 3.51-2.99 8.07-5.43 11.27H8.97L6.71 2.56l5.22-.5 1.2 9.55c1.12-1.87 2.5-4.82 2.5-6.83 0-1.1-.19-1.84-.48-2.46l3.88-.43z"/></svg>
          Pay @${window.VENMO_USERNAME} on Venmo
        </a>
        <button class="btn-ghost" onclick="navigate('queue')" style="margin-top:6px">skip — see the queue →</button>
      </div>
    </div>`;
  } else {
    root.innerHTML = `
    <div class="page">
      <div class="card" style="text-align:center">
        <div class="logo">${window.ARTIST_NAME}</div>
        <div style="font-size:52px;margin-bottom:12px">🌸</div>
        <h2 class="h2">request received!</h2>
        <p style="color:#F4F1EB;font-style:italic;font-size:18px;margin-bottom:6px">"${song}"</p>
        <p class="sub" style="margin-bottom:28px">we'll do our best to get to it!</p>
        <button class="btn-primary" onclick="navigate('queue')">see the live queue →</button>
        <button class="btn-ghost" onclick="navigate('fan')">request another song</button>
      </div>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════════
// QUEUE PAGE
// ══════════════════════════════════════════════════════════════
function queueHTML() {
  return `
  <div class="page">
    <div class="card wide">
      <div class="logo">${window.ARTIST_NAME||"ANJALI"}</div>
      <h1 class="h2" style="margin-bottom:4px">live queue</h1>
      <p class="sub">updates in real time ✨</p>
      <div id="queue-list"><div class="spinner"></div></div>
      <button class="btn-ghost" style="margin-top:16px" onclick="navigate('fan')">← request a song</button>
    </div>
  </div>`;
}

function initQueue() {
  whenReady(() => {
    unsubscribe = window.fbListen(all => {
      const active = all.filter(r => !r.played).sort((a,b) => b.tip-a.tip || a.ts-b.ts);
      const el = document.getElementById("queue-list");
      if (!el) return;
      if (!active.length) {
        el.innerHTML = `<div style="text-align:center;padding:48px 0">
          <div style="font-size:36px;margin-bottom:12px">🎵</div>
          <p style="color:rgba(244,241,235,0.45);font-style:italic">no requests yet — be the first!</p>
        </div>`;
        return;
      }
      el.innerHTML = active.map((r,i) => `
        <div class="queue-row ${i===0?"top":""}">
          ${i===0?'<div class="up-next">up next</div>':""}
          <div class="queue-num ${i===0?"top":""}">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div class="song-title">${escHtml(r.song)}</div>
            <div class="song-from">from ${escHtml(r.name)}</div>
          </div>
          ${r.tip>0?'<div class="boosted">boosted 💖</div>':""}
        </div>`).join("");
    });
  });
}

// DASHBOARD
// ══════════════════════════════════════════════════════════════
function dashHTML() {
  return `
  <div style="min-height:100vh;background:#0a0a0a;font-family:'Cormorant Garamond',Georgia,serif">
    <div style="max-width:580px;margin:0 auto;padding:24px 16px 64px">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div>
          <div style="font-size:10px;letter-spacing:0.2em;color:#E0528D;text-transform:uppercase;margin-bottom:2px">performer dashboard</div>
          <div style="font-family:'Fraunces',serif;font-style:italic;font-size:24px;color:#F4F1EB">${window.ARTIST_NAME||"ANJALI"} — live</div>
        </div>
        <button class="btn-outline" onclick="lockDash()">lock 🔒</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div class="stat-box"><div class="stat-val" id="stat-count">—</div><div class="stat-lbl">in queue</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-tips">—</div><div class="stat-lbl">tips pending</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-notif">—</div><div class="stat-lbl">notifications</div></div>
      </div>

      <div id="notif-btn-wrap"></div>
      <div id="dash-list"><div class="spinner"></div></div>
      <div id="dash-footer"></div>
    </div>
  </div>`;
}

function initDash() {
  // Notification state
  const notifEl = document.getElementById("stat-notif");
  const notifWrap = document.getElementById("notif-btn-wrap");
  function updateNotifUI() {
    const granted = "Notification" in window && Notification.permission === "granted";
    if (notifEl) notifEl.textContent = granted ? "on ✓" : "off";
    if (notifWrap) {
      notifWrap.innerHTML = !granted && "Notification" in window
        ? `<button class="notif-btn" onclick="enableNotifs()">🔔 enable push notifications</button>`
        : "";
    }
  }
  updateNotifUI();
  window._updateNotifUI = updateNotifUI;

  let prevLen = 0;
  whenReady(() => {
    unsubscribe = window.fbListen(all => {
      const active = all.filter(r=>!r.played).sort((a,b)=>b.tip-a.tip||a.ts-b.ts);
      const totalTips = active.reduce((s,r)=>s+(r.tip||0),0);

      // Stats
      const sc = document.getElementById("stat-count");
      const st = document.getElementById("stat-tips");
      if (sc) sc.textContent = active.length;
      if (st) st.textContent = "$"+totalTips;

      // Push notification on new request
      if (prevLen > 0 && active.length > prevLen) {
        const newest = active.find(r => r.ts > Date.now() - 8000);
        if (newest && Notification.permission === "granted") {
          new Notification(`🎵 New request: "${newest.song}"`, {
            body: newest.name + (newest.tip>0 ? ` · $${newest.tip} tip` : ""),
            icon: "/favicon.ico",
          });
        }
      }
      prevLen = active.length;

      // List
      const el = document.getElementById("dash-list");
      if (!el) return;
      if (!active.length) {
        el.innerHTML = `<div style="text-align:center;padding:48px 0;color:rgba(244,241,235,0.45)">
          <div style="font-size:32px;margin-bottom:8px">🎵</div>no requests yet</div>`;
        document.getElementById("dash-footer").innerHTML = "";
        return;
      }
      el.innerHTML = active.map((r,i) => `
        <div style="background:#1a1818;border:1px solid ${i===0?"rgba(224,82,141,0.5)":"rgba(244,241,235,0.1)"};
             border-radius:6px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <div class="queue-num ${i===0?"top":""}">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div class="song-title">${escHtml(r.song)}</div>
            <div class="song-from">${escHtml(r.name)}${r.tip>0?`<span class="tip-amt">$${r.tip} tip 💖</span>`:""}</div>
          </div>
          <button class="btn-played" onclick="markPlayed('${r.key}')">✓ played</button>
        </div>`).join("");

      document.getElementById("dash-footer").innerHTML = `
        <button class="btn-ghost" onclick="clearAll()" style="margin-top:8px;display:block;width:100%">
          clear entire queue
        </button>`;
    });
  });
}

function lockDash() {
  authed = false;
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  navigate("fan");
}

async function markPlayed(key) {
  await window.fbMarkPlayed(key);
}

async function clearAll() {
  if (!confirm("Clear the entire queue?")) return;
  await window.fbClearAll();
}

async function enableNotifs() {
  const p = await Notification.requestPermission();
  if (window._updateNotifUI) window._updateNotifUI();
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
function loginHTML() {
  return `
  <div class="page">
    <div class="card" style="max-width:340px">
      <div class="logo">${window.ARTIST_NAME||"ANJALI"}</div>
      <h2 class="h2" style="font-size:20px;margin-bottom:24px">performer login</h2>
      <input type="password" class="input" id="pw" placeholder="password" style="margin-bottom:10px"
        onkeydown="if(event.key==='Enter')attemptLogin()">
      <div id="login-err"></div>
      <button class="btn-primary" onclick="attemptLogin()">enter →</button>
    </div>
  </div>`;
}

function attemptLogin() {
  const pw = document.getElementById("pw")?.value;
  if (pw === window.DASHBOARD_PASSWORD) {
    authed = true;
    view = "dashboard";
    history.replaceState(null,"","#dashboard");
    render();
  } else {
    document.getElementById("login-err").innerHTML =
      `<p style="color:#ff6b6b;font-size:11px;text-align:center;margin-bottom:10px">incorrect password</p>`;
    document.getElementById("pw").value = "";
  }
}

// ── Utilities ────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ─────────────────────────────────────────────────────
const initHash = location.hash.replace("#","");
if (initHash === "dashboard") { view = "login"; }
else if (initHash === "queue") { view = "queue"; }
else { view = "fan"; }
render();
</script>
